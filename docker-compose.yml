version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: fypms_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fypms_db}
      MYSQL_USER: ${MYSQL_USER:-fypms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fypms_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: fypms_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  mysql_data: